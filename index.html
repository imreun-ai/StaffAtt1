<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ប្រព័ន្ធចុះវត្តមានគ្រូបង្រៀន</title>
    <!-- Favicon and App Icons -->
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/128/17163/17163937.png" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/128/17163/17163937.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered successfully!', reg.scope))
            .catch(err => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
